<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cấu hình thông tin liên hệ</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }

    .config-container {
      background: white;
      padding: 3rem;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 500px;
      width: 100%;
    }

    h1 {
      color: #667eea;
      margin-bottom: 1rem;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 2rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      color: #333;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 0.8rem;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
    }

    .hint {
      font-size: 0.9rem;
      color: #999;
      margin-top: 0.3rem;
    }

    .btn {
      width: 100%;
      padding: 1rem;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: background 0.3s;
    }

    .btn:hover {
      background: #5568d3;
    }

    .success-message {
      display: none;
      background: #d4edda;
      color: #155724;
      padding: 1rem;
      border-radius: 8px;
      margin-top: 1rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="config-container">
    <h1>⚙️ Cấu hình liên hệ</h1>
    <p class="subtitle">Thông tin này sẽ hiển thị trên trang loading</p>

    <form id="config-form">
      <div class="form-group">
        <label for="zalo">Số Zalo:</label>
        <input type="text" id="zalo" placeholder="0123456789" required>
        <p class="hint">Ví dụ: 0912345678</p>
      </div>

      <div class="form-group">
        <label for="facebook">Facebook Page:</label>
        <input type="text" id="facebook" placeholder="tenchuyentrang" required>
        <p class="hint">Ví dụ: bepchayhanoi (phần sau facebook.com/)</p>
      </div>

      <button type="submit" class="btn">💾 Lưu cấu hình</button>
    </form>

    <div class="success-message" id="success">
      ✅ Đã lưu thành công! Bạn có thể đóng trang này.
    </div>
  </div>

  <script>
    // Load dữ liệu hiện tại
    document.getElementById('zalo').value = localStorage.getItem('zaloNumber') || '';
    document.getElementById('facebook').value = localStorage.getItem('facebookPage') || '';

    // Xử lý form submit
    document.getElementById('config-form').addEventListener('submit', function(e) {
      e.preventDefault();

      const zalo = document.getElementById('zalo').value;
      const facebook = document.getElementById('facebook').value;

      // Lưu vào localStorage
      localStorage.setItem('zaloNumber', zalo);
      localStorage.setItem('facebookPage', facebook);

      // Hiển thị thông báo thành công
      document.getElementById('success').style.display = 'block';

      // Tự động ẩn sau 3 giây
      setTimeout(() => {
        document.getElementById('success').style.display = 'none';
      }, 3000);
    });
  </script>
</body>
</html>
